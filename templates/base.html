<!DOCTYPE html>
<html><head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#111111;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#111111;padding:24px 0">
<tr><td align="center">
<table width="640" cellpadding="0" cellspacing="0" style="background:#1c1c1c;border-radius:8px;overflow:hidden;border:1px solid #333333">

  <!-- Header bar -->
  <tr><td style="padding:20px 28px;border-bottom:1px solid #333333">
    <table width="100%" cellpadding="0" cellspacing="0"><tr>
      <td style="color:#ffffff;font-size:18px;font-weight:600;letter-spacing:-0.3px">{{ title }}</td>
      <td align="right">
        <span style="display:inline-block;padding:4px 14px;border-radius:4px;font-size:11px;
              font-weight:700;letter-spacing:1px;background:{{ sev_color }};color:#ffffff">{{ sev_label }}</span>
      </td>
    </tr></table>
  </td></tr>

  <!-- Subtitle / meta -->
  <tr><td style="padding:10px 28px;color:#cccccc;font-size:12px;border-bottom:1px solid #333333">
    {% block subtitle %}{% endblock %}
  </td></tr>

  <!-- Stat cards -->
  <tr><td style="padding:20px 16px 12px">
    <table cellpadding="0" cellspacing="0" style="width:100%;table-layout:fixed"><tr>
      {% for card in stat_cards %}
      <td style="padding:0 4px;vertical-align:top"><div style="background:#252525;border:1px solid #3a3a3a;border-radius:6px;padding:14px 6px;text-align:center">
        <div style="font-size:24px;font-weight:700;color:{{ card.color }};line-height:1.2">{{ card.value }}</div>
        <div style="font-size:10px;color:#999999;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px">{{ card.label }}</div>
      </div></td>
      {% endfor %}
    </tr></table>
  </td></tr>

  <!-- Content -->
  <tr><td style="padding:12px 20px 24px">
    {% block content %}{% endblock %}
  </td></tr>

  <!-- Footer -->
  <tr><td style="padding:14px 28px;border-top:1px solid #333333">
    <table width="100%" cellpadding="0" cellspacing="0"><tr>
      <td style="color:#555555;font-size:11px">Email Security Monitor</td>
      <td align="right" style="color:#555555;font-size:11px">{{ timestamp }}</td>
    </tr></table>
  </td></tr>

</table>
</td></tr></table>
</body></html>
