[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "S", "B", "UP"]
ignore = [
    "S101",  # allow assert in tests
    "S105",  # false positive: "pass" is not a password
    "S106",  # false positive: pass_value is not a password
    "S107",  # false positive: pass_value default is not a password
]

[tool.ruff.lint.per-file-ignores]
"test_alert.py" = ["E402"]
"tests/*" = ["S101"]
"alert.py" = ["E501"]  # long HTML template lines

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = "graph_client"
warn_return_any = false  # Graph API returns untyped JSON

[[tool.mypy.overrides]]
module = ["defusedxml", "defusedxml.*", "msal"]
ignore_missing_imports = true
follow_untyped_imports = true

[tool.bandit]
exclude_dirs = [".venv", "tests"]
skips = ["B101"]
