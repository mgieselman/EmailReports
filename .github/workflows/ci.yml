name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          pip install -r requirements.txt
          pip install ruff==0.15.6 mypy==1.19.1 bandit==1.9.4 types-requests==2.32.4.20260107

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy *.py --exclude generate_screenshots.py

      - name: Bandit security scan
        run: bandit -r . -x ./.venv,./tests -ll

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest==9.0.2 pytest-cov==7.0.0

      - name: Run tests
        run: pytest tests/ --cov --cov-report=term-missing --cov-report=xml --cov-fail-under=100 -W error::DeprecationWarning
        env:
          AZURE_TENANT_ID: test
          AZURE_CLIENT_ID: test
          AZURE_CLIENT_SECRET: test
          REPORT_MAILBOX: test@test.com
          MAIL_FOLDER: ""
          DMARC_ALIAS: dmarc@test.com
          TLSRPT_ALIAS: tls@test.com
          TEAMS_WEBHOOK_URL: ""
          GENERIC_WEBHOOK_URL: ""
          DELETE_AFTER_DAYS: "-1"
          MOVE_PROCESSED_TO: ""
          ALERT_EMAIL_ENABLED: "false"
          ALERT_EMAIL_FROM: test@test.com
          ALERT_EMAIL_TO: test@test.com
          TIMER_SCHEDULE_CRON: "0 */30 * * * *"

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
