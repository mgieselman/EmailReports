name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install ruff mypy bandit types-requests

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy *.py

      - name: Bandit security scan
        run: bandit -r . -x ./.venv,./tests -ll

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ --cov --cov-report=term-missing -W error::DeprecationWarning
        env:
          AZURE_TENANT_ID: test
          AZURE_CLIENT_ID: test
          AZURE_CLIENT_SECRET: test
          REPORT_MAILBOX: test@test.com
          MAIL_FOLDER: ""
          DMARC_ALIAS: dmarc@test.com
          TLSRPT_ALIAS: tls@test.com
          TEAMS_WEBHOOK_URL: ""
          ALERT_EMAIL_ENABLED: "false"
          ALERT_EMAIL_FROM: test@test.com
          ALERT_EMAIL_TO: test@test.com
          TIMER_SCHEDULE_CRON: "0 */30 * * * *"

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
