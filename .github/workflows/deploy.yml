name: Deploy to Azure Functions

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    needs: [ci]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies into package
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create deployment package
        run: |
          cd ${{ github.workspace }}
          zip -r deploy.zip . -x '.venv/*' '.git/*' 'tests/*' 'scripts/*' '__pycache__/*' '.github/*' '*.pyc' '.gitignore' 'CLAUDE.md' 'CODE_OF_CONDUCT.md' 'CONTRIBUTING.md' 'SECURITY.md' 'docs/*'

      - name: Deploy to Azure Functions
        run: |
          az functionapp deploy \
            --resource-group rg-emailreports-prod \
            --name func-emailreports-flex \
            --src-path deploy.zip \
            --type zip \
            --clean true
