name: Deploy to Azure Functions

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    needs: [ci]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies into package
        run: pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Open storage firewall for deployment
        run: |
          az storage account update \
            --name stemailreportsprod \
            --resource-group rg-emailreports-prod \
            --default-action Allow
          sleep 30  # wait for firewall rule to propagate

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-emailreports-flex
          package: .
          remote-build: false

      - name: Restore storage firewall
        if: always()
        run: |
          az storage account update \
            --name stemailreportsprod \
            --resource-group rg-emailreports-prod \
            --default-action Deny
